<div class="auth-page">
  <div class="auth-page__deco" aria-hidden="true">
    <div class="deco-content">
      <span class="deco-icon">✂</span>
      <h2>El arte del <em>buen corte</em></h2>
      <p>Reserva tu cita en minutos y luce impecable.</p>
      <div class="deco-lines"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="auth-page__form-wrap">
    <div class="auth-card">
      <div class="auth-card__header">
        <a routerLink="/" class="auth-card__logo">✂ Unidos <em>Barber</em></a>
        <h1>Bienvenido de vuelta</h1>
        <p>Ingresa tus datos para continuar</p>
      </div>
      <div *ngIf="error" class="auth-card__error">⚠ {{ error }}</div>
      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="form-field">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" formControlName="email" placeholder="tu@correo.com" />
          <span class="error-msg" *ngIf="email.touched && email.hasError('required')">El correo es obligatorio</span>
          <span class="error-msg" *ngIf="email.touched && email.hasError('email')">Ingresa un correo válido</span>
        </div>
        <div class="form-field">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <input id="password" [type]="showPass ? 'text' : 'password'" formControlName="password" placeholder="••••••••" />
            <button type="button" class="toggle-pass" (click)="showPass = !showPass">{{ showPass ? '🙈' : '👁' }}</button>
          </div>
          <span class="error-msg" *ngIf="password.touched && password.hasError('required')">La contraseña es obligatoria</span>
        </div>
        <button type="submit" class="btn btn--primary btn--full" [disabled]="loading">
          <span *ngIf="!loading">Iniciar sesión</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>
      <p class="auth-card__footer">¿No tienes cuenta? <a routerLink="/auth/register">Regístrate gratis</a></p>
    </div>
  </div>
</div>
