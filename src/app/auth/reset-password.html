<div class="auth-page">
  <div class="auth-page__deco" aria-hidden="true">
    <div class="deco-content">
      <span class="deco-icon">✂</span>
      <h2>Un nuevo <em>comienzo</em></h2>
      <p>Elige una contraseña segura que puedas recordar.</p>
      <div class="deco-lines"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="auth-page__form-wrap">
    <div class="auth-card">
      <div class="auth-card__header">
        <a routerLink="/" class="auth-card__logo">✂ Unidos <em>Barber</em></a>
        <h1>Nueva contraseña</h1>
        <p>Ingresa tu nueva contraseña a continuación.</p>
      </div>

      <div class="auth-card__error" *ngIf="error">⚠ {{ error }}</div>

      <div class="success-box" *ngIf="success">
        <span>✓</span>
        <div><strong>¡Contraseña actualizada!</strong><p>Redirigiendo al login...</p></div>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate *ngIf="!success && token">
        <div class="form-field">
          <label>Nueva contraseña</label>
          <div class="input-wrap">
            <input [type]="showPass ? 'text' : 'password'" formControlName="password" placeholder="Mínimo 8 caracteres" />
            <button type="button" class="toggle-pass" (click)="showPass = !showPass">{{ showPass ? '🙈' : '👁' }}</button>
          </div>
          <span class="error-msg" *ngIf="password.touched && password.hasError('required')">La contraseña es obligatoria</span>
          <span class="error-msg" *ngIf="password.touched && password.hasError('minlength')">Mínimo 8 caracteres</span>
        </div>
        <button type="submit" class="btn btn--primary btn--full" [disabled]="loading">
          <span *ngIf="!loading">Restablecer contraseña</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>

      <p class="auth-card__footer"><a routerLink="/auth/login">Volver al login</a></p>
    </div>
  </div>
</div>
